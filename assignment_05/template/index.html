<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OlympicLens — Disrupted Games</title>
  <link rel="icon" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header id="app-header">
    <div class="header-title">
      <span class="brand">OlympicLens</span>
      <span class="brand-sub">Disrupted Games — Olympic Participation Through Global Events</span>
    </div>
    <div class="header-filter">
      <span class="filter-label">Year Range:</span>
      <span class="filter-value" id="year-range-display">1896 – 2016</span>
      <button class="filter-reset" id="reset-range">Reset</button>
    </div>
  </header>

  <main id="container">

    <section class="viz-section" id="viz1-section">
      <h2>
        Disrupted Games
        <span class="viz-subtitle">Olympic Participation Through Global Events · 1896–2016</span>
      </h2>
      <div id="viz1-root"></div>
    </section>

    <section class="viz-section" id="viz2-section">
      <h2>
        Medal Efficiency by Country
        <span class="viz-subtitle">Choropleth · medals ÷ athletes sent</span>
      </h2>
      <div id="viz2-root"></div>
    </section>

    <section class="viz-section" id="viz3-section">
      <h2>
        Country–Sport Dominance Network
        <span class="viz-subtitle">Force-directed bipartite graph</span>
      </h2>
      <div id="viz3-root"></div>
    </section>

  </main>

  <script src="d3.v7.min.js"></script>
  <script type="module" src="main.js"></script>
  <script type="module">
    import { loadViz1 } from './viz1.js';
    loadViz1();

    // Viz2 / Viz3 loaders are wired independently in their own modules.
    // Uncomment once viz2.js / viz3.js expose their own load functions:
    // import { loadViz2 } from './viz2.js';
    // import { loadViz3 } from './viz3.js';
    // loadViz2();
    // loadViz3();
  </script>

</body>
</html>
