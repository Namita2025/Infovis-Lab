<script>

	const assignment_id = "02"
	const student_name = "firstname lastname" // type your name here

	function loadData() {
		(async function() {
			try {
				const unfallatlasData = await d3.json("public/accident_data_2016-2024.json")
				const germanyData = await d3.json("public/germany_states.geo.json")

				// call function to draw the map and the cities information
				drawMap(unfallatlasData, germanyData)
			} catch(error) {
				console.log(error)
			}
		})();		
	}


	// nav bar: fill assignment number and student name 
	document.getElementById("assignment_id").innerHTML = "<b>PCIV</b> Assignment: "+assignment_id
	document.getElementById("name").innerText = student_name
	
	// load data and plot map
	loadData()		
	
  </script>
